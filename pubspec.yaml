name: YoloScope
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0
  flutter: ">=3.32.1"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  path_provider: ^2.0.0
  archive: ^3.0.0
  http: ^1.0.0
  provider: ^6.1.2
  ultralytics_yolo: ^0.1.26
  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/models/
    - assets/logo.png
    - assets/applogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"
